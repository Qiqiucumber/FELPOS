<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--pink:#FF2D8A;--dark:#0A0A0A;}
body{background:var(--dark);color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;overflow:hidden;}
.bg-glow{position:fixed;inset:0;background:radial-gradient(ellipse 70% 70% at 50% 50%,rgba(255,45,138,0.09) 0%,transparent 70%);pointer-events:none;}
.sheep{width:200px;margin-bottom:12px;animation:wobble 2.2s ease-in-out infinite;}
@keyframes wobble{0%,100%{transform:rotate(-4deg);}50%{transform:rotate(4deg);}}
.code{font-family:'Bebas Neue',sans-serif;font-size:clamp(7rem,20vw,12rem);color:var(--pink);line-height:0.9;letter-spacing:-4px;}
.msg{font-size:1.1rem;color:rgba(255,255,255,0.5);margin:16px 0 8px;max-width:380px;}
.sub{font-size:0.85rem;color:rgba(255,255,255,0.3);margin-bottom:40px;max-width:340px;}
.back-btn{background:var(--pink);color:#fff;padding:16px 40px;border-radius:100px;text-decoration:none;font-weight:700;font-size:0.95rem;letter-spacing:0.5px;transition:box-shadow 0.3s,transform 0.2s;}
.back-btn:hover{box-shadow:0 8px 36px rgba(255,45,138,0.35);transform:translateY(-2px);}
.bubbles{position:fixed;inset:0;pointer-events:none;overflow:hidden;}
.bubble{position:absolute;border-radius:50%;background:rgba(255,45,138,0.08);animation:float linear infinite;}
@keyframes float{0%{transform:translateY(100vh) scale(0);opacity:0;}20%{opacity:1;}80%{opacity:0.5;}100%{transform:translateY(-100px) scale(1.2);opacity:0;}}
</style>
