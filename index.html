<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f31773">
<title>FELPOS — Creemos algo juntos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>

/* ============================================ */
/* ===========  INTRO (oveja + chicle) ========= */
/* ============================================ */

/* ── RESET & VARIABLES ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --pink: #f31773;
  --white: #ffffff;
  --bg: #ffffff;
  --text: #111111;
  --text-muted: #888888;
  --border: #ebebeb;
}
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

/* ── INTRO ── */
#intro{
  position:fixed;inset:0;z-index:9000;
  background:var(--pink);
  display:flex;align-items:center;justify-content:center;
  /* NO transition — snap out instantly to avoid logo ghost */
  overflow:hidden;
}
#intro.gone{display:none;}

.intro-logo-wrap{
  position:relative;
  /* Logo más grande: 75vw con máximo razonable */
  width:88vw;
  max-width:420px;
  /* aspect ratio del logo original es 1414:2000 ≈ 0.707 */
  height:calc(88vw * 1.12);
  max-height:calc(420px * 1.12);
  display:flex;align-items:center;justify-content:center;
  /* centrado perfecto vertical */
  margin-top:-5vh;
}
.intro-logo-img{
  width:100%;height:100%;
  object-fit:contain;
  position:relative;z-index:2;
  display:block;
}

.intro-bubble{
  position:absolute;
  /* Chicle está al 49.8% horizontal, 49.9% vertical del logo */
  top:50.2%;
  left:47.6%;
  /* Ancho = 31.4% del logo-wrap, alto proporcional */
  width:21.2%;
  height:23.2%;
  transform:translate(-50%,-50%) scale(1);
  z-index:3;
  overflow:visible;
  animation:bubbleGrow 1.8s cubic-bezier(.55,0,.1,1) 0.5s forwards;
}
.intro-bubble svg{
  width:100%;height:100%;
  overflow:visible;
}
@keyframes bubbleGrow{
  0%   { transform:translate(-50%,-50%) scale(1); }
  100% { transform:translate(-50%,-50%) scale(120); }
}
  100% { transform:translate(-50%,-50%) scale(120); }
}

/* ============================================ */
/* ===========  HERO + MOODBOARD ================ */
/* ============================================ */

  :root{
    --pink: #f31773;
    --pink-dark: #c20f5c;
    --pink-soft: #fde3ed;
    --ink: #2b1320;
    --paper: #ffffff;
    --grey-box: #ececec;
    --thread: #d9667e;
  }

  body{
    background:var(--paper);
    font-family:'Nunito', sans-serif;
    color:var(--ink);
    overflow-x:hidden;
  }

  .felpos-hero{
    position:relative;
    max-width:480px;
    margin:0 auto;
    padding:48px 28px 64px;
    overflow:hidden;
  }

  /* ===== Halftone decoration, top-left ===== */
  .halftone{
    position:absolute;
    top:0;
    left:0;
    width:140px;
    height:140px;
    pointer-events:none;
    opacity:0;
    animation:fadeIn 0.8s ease forwards;
    animation-delay:0.1s;
  }
  .halftone svg{display:block;}

  @keyframes fadeIn{ to{opacity:1;} }

  /* ===== Headline ===== */
  .hero-title{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:clamp(2.6rem, 12vw, 3.6rem);
    line-height:0.92;
    color:var(--pink);
    text-align:center;
    letter-spacing:0.5px;
    position:relative;
    z-index:2;
    margin-top:28px;
  }

  .hero-title span{
    display:block;
    opacity:0;
    transform:translateY(18px);
    animation:riseIn 0.6s cubic-bezier(.2,.8,.25,1) forwards;
  }
  .hero-title span:nth-child(1){animation-delay:.05s;}
  .hero-title span:nth-child(2){animation-delay:.18s;}
  .hero-title span:nth-child(3){animation-delay:.31s;}

  @keyframes riseIn{
    to{opacity:1; transform:translateY(0);}
  }

  .hero-sub{
    text-align:center;
    font-family:'Baloo 2', sans-serif;
    font-weight:600;
    font-size:0.95rem;
    letter-spacing:1.5px;
    color:var(--ink);
    margin-top:14px;
    opacity:0;
    animation:riseIn 0.6s ease forwards;
    animation-delay:.45s;
  }

  /* ===== Thread divider ===== */
  .thread-divider{
    margin:36px 0 38px;
    position:relative;
    height:46px;
  }
  .thread-divider svg{
    width:100%;
    height:100%;
    display:block;
    overflow:visible;
  }
  .thread-path{
    stroke-dasharray:8 9;
    stroke-dashoffset:0;
  }
  .thread-loop{
    stroke-dasharray:160;
    stroke-dashoffset:160;
    animation:loopDraw 0.9s ease forwards;
    animation-delay:.7s;
  }
  @keyframes loopDraw{ to{ stroke-dashoffset:0; } }

  /* ===== Moodboard ===== */
  .moodboard{
    position:relative;
    margin-bottom:54px;
  }

  .photo-box{
    background:var(--grey-box);
    border:2px solid var(--pink);
    border-radius:22px;
    overflow:hidden;
    opacity:0;
    transform:scale(.92);
    animation:popIn 0.55s cubic-bezier(.2,.8,.3,1.2) forwards;
  }

  .photo-box img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  @keyframes popIn{ to{ opacity:1; transform:scale(1); } }

  .photo-1{
    width:46%;
    aspect-ratio:1/1.05;
    animation-delay:.9s;
  }

  .photo-2{
    width:42%;
    aspect-ratio:1/1.1;
    margin-left:6%;
    margin-top:14px;
    animation-delay:1.05s;
  }

  .photo-3{
    width:40%;
    aspect-ratio:1/1.05;
    margin-left:6%;
    animation-delay:1.2s;
  }

  .moodboard-bottom-row{
    display:flex;
    align-items:flex-end;
  }

  /* badge cluster */
  .badge-cluster{
    position:absolute;
    top:0;
    right:0;
    width:54%;
    z-index:3;
  }

  .badge-ghost{
    background:#f1eeee;
    color:#cfcfcf;
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:1.5rem;
    text-align:center;
    border-radius:18px;
    padding:14px 10px 28px;
    transform:rotate(-3deg);
    opacity:0;
    animation:popIn 0.55s cubic-bezier(.2,.8,.3,1.2) forwards;
    animation-delay:1.0s;
  }

  .badge-main{
    background:var(--pink);
    color:#fff;
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:1.9rem;
    text-align:center;
    border-radius:18px;
    padding:14px 8px;
    margin-top:-20px;
    box-shadow:0 10px 24px -8px rgba(243,23,115,.55);
    transform:rotate(-3deg);
    opacity:0;
    animation:popIn 0.55s cubic-bezier(.2,.8,.3,1.2) forwards;
    animation-delay:1.15s;
    position:relative;
    z-index:2;
  }

  /* ===== CTA section ===== */
  .cta-question{
    text-align:center;
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:1.5rem;
    color:var(--pink);
    margin-bottom:26px;
    opacity:0;
    animation:riseIn 0.6s ease forwards;
    animation-delay:1.35s;
  }

  .cta-button-wrap{
    text-align:center;
    opacity:0;
    animation:riseIn 0.6s ease forwards;
    animation-delay:1.5s;
  }

  .cta-button{
    display:inline-flex;
    align-items:center;
    gap:10px;
    background:var(--pink);
    color:#fff;
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:1.3rem;
    letter-spacing:0.5px;
    padding:18px 46px;
    border-radius:50px;
    text-decoration:none;
    box-shadow:0 14px 30px -10px rgba(243,23,115,.6);
    transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
  }

  .cta-button:hover{
    transform:translateY(-3px) scale(1.03);
    background:var(--pink-dark);
    box-shadow:0 18px 34px -8px rgba(243,23,115,.7);
  }

  .cta-button:focus-visible{
    outline:3px solid var(--ink);
    outline-offset:3px;
  }

  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{
      animation-duration:0.01ms !important;
      animation-delay:0s !important;
      transition-duration:0.01ms !important;
    }
  }

  @media (max-width:380px){
    .hero-title{font-size:2.3rem;}
    .badge-main{font-size:1.5rem;}
    .badge-ghost{font-size:1.2rem;}
  }
</style>
</head>
